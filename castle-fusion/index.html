<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Castle Fusion Defense — Prototipo 3D</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=UnifrakturCook:wght@700&display=swap" rel="stylesheet">
<style>
  :root{
    --void:#0a0908; --stone:#15110f; --stone-2:#1e1813;
    --gold:#b8934a; --gold-hi:#e6c877; --gold-dim:#6e5a30;
    --parch:#d9c8a0; --parch-dim:#8a7a5c;
    --blood:#7d1f28; --blood-hi:#a83440; --hp:#c8506a;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;background:var(--void);color:var(--parch);
    font-family:'EB Garamond',Georgia,serif;-webkit-font-smoothing:antialiased;}
  body{ min-height:100vh;
    background:radial-gradient(120% 90% at 50% -10%, #241a13 0%, #0d0a08 55%, #060504 100%), var(--void); }
  #app{max-width:960px;margin:0 auto;padding:22px 18px 40px;position:relative;}

  .crest{text-align:center;margin-bottom:14px;}
  h1{ font-family:'UnifrakturCook','Cinzel',serif; font-weight:700; font-size:44px; line-height:1;
    margin:0; color:var(--gold-hi); text-shadow:0 1px 0 #000, 0 0 22px rgba(184,147,74,.35); letter-spacing:1px; }
  .sub{ font-family:'Cinzel',serif; font-size:11px; letter-spacing:3px; text-transform:uppercase;
    color:var(--parch-dim); margin:6px 0 0; }
  .rule{display:flex;align-items:center;justify-content:center;gap:12px;margin:10px auto 0;max-width:420px;}
  .rule::before,.rule::after{content:"";height:1px;flex:1;}
  .rule::before{background:linear-gradient(90deg,transparent,var(--gold-dim));}
  .rule::after{background:linear-gradient(90deg,var(--gold-dim),transparent);}
  .rule span{font-size:12px;color:var(--gold);}

  .frame{position:relative; background:linear-gradient(180deg,var(--stone-2),var(--stone));
    border:1px solid var(--gold-dim); box-shadow:0 0 0 1px #000 inset, 0 10px 30px rgba(0,0,0,.6); border-radius:3px; }
  .frame::before,.frame::after{content:"";position:absolute;width:14px;height:14px;pointer-events:none;}
  .frame::before{top:4px;left:4px;border-top:2px solid var(--gold);border-left:2px solid var(--gold);}
  .frame::after{bottom:4px;right:4px;border-bottom:2px solid var(--gold);border-right:2px solid var(--gold);}

  #hud{display:flex;align-items:stretch;margin-bottom:12px;padding:0;overflow:hidden;}
  #hud .stat{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:11px 8px;}
  #hud .stat + .stat{border-left:1px solid var(--gold-dim);}
  #hud .lbl{font-family:'Cinzel',serif;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--parch-dim);}
  #hud .val{font-family:'Cinzel',serif;font-weight:700;font-size:20px;font-variant-numeric:tabular-nums;color:var(--parch);}
  #hud .val.gold{color:var(--gold-hi);} #hud .val.hp{color:var(--hp);}
  #hud .val.state{font-size:12px;font-weight:500;color:var(--parch-dim);letter-spacing:1px;}

  #wrap{position:relative;overflow:hidden;border-radius:3px;background:#8ec9ff;
    border:1px solid var(--gold-dim); box-shadow:0 0 0 1px #000 inset,0 0 0 4px #100c0a,0 10px 30px rgba(0,0,0,.6);}
  #wrap::before,#wrap::after{content:"";position:absolute;width:18px;height:18px;z-index:3;pointer-events:none;}
  #wrap::before{top:6px;left:6px;border-top:2px solid var(--gold);border-left:2px solid var(--gold);}
  #wrap::after{bottom:6px;right:6px;border-bottom:2px solid var(--gold);border-right:2px solid var(--gold);}
  #stage{width:100%;aspect-ratio:940/520;display:block;cursor:grab;}
  #stage.grabbing{cursor:grabbing;}
  #stage canvas{display:block;width:100%!important;height:100%!important;}

  #shop{display:flex;gap:12px;margin-top:16px;flex-wrap:wrap;}
  .tower-btn{ position:relative;width:106px;min-height:74px;cursor:pointer;text-align:left;
    background:linear-gradient(180deg,#221a14,#140f0c); border:1px solid var(--gold-dim); border-radius:4px;
    box-shadow:0 0 0 1px #000 inset, 0 4px 10px rgba(0,0,0,.5); padding:11px 10px 12px; color:var(--parch);
    transition:transform .08s, box-shadow .12s, border-color .12s; }
  .tower-btn:hover{border-color:var(--gold);transform:translateY(-2px);
    box-shadow:0 0 0 1px #000 inset,0 0 14px rgba(184,147,74,.4),0 6px 14px rgba(0,0,0,.5);}
  .tower-btn.selected{border-color:var(--gold-hi);box-shadow:0 0 0 1px var(--gold-hi) inset,0 0 18px rgba(230,200,119,.5);}
  .tower-btn:disabled{opacity:.42;cursor:not-allowed;filter:grayscale(.4);transform:none;}
  .tower-btn .swatch{display:block;width:100%;height:6px;border-radius:2px;margin-bottom:7px;box-shadow:0 0 6px rgba(0,0,0,.5) inset;}
  .tower-btn .name{display:block;font-family:'Cinzel',serif;font-weight:600;font-size:13px;letter-spacing:.5px;}
  .tower-btn .gem{ position:absolute;top:-9px;right:-9px;width:26px;height:26px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    background:radial-gradient(circle at 35% 30%,#f2dd9e,#b8934a 60%,#6e5a30);
    border:1px solid #3a2c15;box-shadow:0 2px 5px rgba(0,0,0,.6);
    font-family:'Cinzel',serif;font-weight:700;font-size:11px;color:#2a1e0c;}

  .row{display:flex;gap:10px;margin-top:14px;align-items:center;flex-wrap:wrap;}
  button.ctrl{ font-family:'Cinzel',serif;font-weight:600;font-size:13px;letter-spacing:1px;cursor:pointer;
    border-radius:3px;padding:11px 18px;color:#f0dfb4; background:linear-gradient(180deg,#8f2531,#5f1720);
    border:1px solid var(--gold-dim); box-shadow:0 0 0 1px #000 inset,0 3px 8px rgba(0,0,0,.5);text-shadow:0 1px 0 #000;}
  button.ctrl:hover{border-color:var(--gold);box-shadow:0 0 0 1px #000 inset,0 0 14px rgba(168,52,64,.5);}
  button.ctrl:disabled{opacity:.45;cursor:not-allowed;filter:grayscale(.5);}
  button.ctrl.secondary{background:linear-gradient(180deg,#2a221a,#171210);color:var(--parch);}
  button.ctrl.secondary:hover{border-color:var(--gold);}
  .hint{font-family:'EB Garamond',serif;font-style:italic;font-size:13px;color:var(--parch-dim);}

  #msg{margin-top:12px;font-family:'EB Garamond',serif;font-style:italic;font-size:14px;color:var(--parch-dim);min-height:20px;}

  #overlay{position:absolute;inset:0;display:none;align-items:center;justify-content:center;z-index:5;padding:20px;
    background:radial-gradient(circle at 50% 40%,rgba(20,12,8,.85),rgba(5,3,2,.94)); flex-direction:column;gap:14px;text-align:center;}
  #overlay h2{font-family:'Cinzel',serif;font-weight:700;margin:0;font-size:30px;letter-spacing:2px;
    color:var(--gold-hi);text-shadow:0 0 20px rgba(184,147,74,.4);}
  #overlay p{font-family:'EB Garamond',serif;font-style:italic;margin:0;color:var(--parch-dim);font-size:15px;max-width:340px;}

  @media (max-width:520px){ h1{font-size:32px;} #hud .val{font-size:16px;} }
</style>
</head>
<body>
<div id="app">
  <div class="crest">
    <h1>Castle Fusion Defense</h1>
    <p class="sub">Defensa de fusión · prototipo arcano</p>
    <div class="rule"><span>✦</span></div>
  </div>

  <div id="hud" class="frame">
    <div class="stat"><span class="lbl">Oro</span><span class="val gold" id="gold">0</span></div>
    <div class="stat"><span class="lbl">Bastión</span><span class="val hp" id="castle">0</span></div>
    <div class="stat"><span class="lbl">Oleada</span><span class="val" id="waveLine">0 / 0</span></div>
    <div class="stat"><span class="lbl">Fase</span><span class="val state" id="waveState">—</span></div>
  </div>

  <div id="wrap">
    <div id="stage"></div>
    <div id="overlay">
      <h2 id="ovTitle"></h2><p id="ovText"></p>
      <button class="ctrl" id="ovBtn">Alzar de nuevo</button>
    </div>
  </div>

  <div id="shop"></div>

  <div class="row">
    <button class="ctrl" id="startBtn">Invocar oleada</button>
    <button class="ctrl secondary" id="sellBtn">Desmantelar: OFF</button>
    <span class="hint">Elige una torre y señala un cimiento. Arrastra para observar el campo.</span>
  </div>

  <div id="msg"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
/* =========================================================================
   Castle Fusion Defense — Prototipo 3D (Three.js)
   LÓGICA de juego intacta (world coords 2D). Three.js = render + cámara.
   Cámara orbital ortográfica: pan (arrastrar), zoom (rueda), rotar (clic der).
   ========================================================================= */

/* 1) TORRES BASE */
const TOWERS = {
  tesla:     { name:'Tesla',     color:0x8f7bff, cost:60,  damage:8,  rate:1.2, range:110, splash:0,  note:'cadena (simplificada)' },
  hielo:     { name:'Hielo',     color:0x5ad2ff, cost:50,  damage:2,  rate:1.0, range:100, splash:0,  slow:{mult:0.55, dur:1.5} },
  fuego:     { name:'Fuego',     color:0xff7a3c, cost:70,  damage:15, rate:0.6, range:90,  splash:42 },
  arquero:   { name:'Arquero',   color:0x7de08a, cost:50,  damage:12, rate:1.8, range:160, splash:0 },
  catapulta: { name:'Catapulta', color:0xd9b06a, cost:120, damage:40, rate:0.35,range:170, splash:55 },
};

/* 2) MAPA MÁS GRANDE: path serpenteante + más slots (world coords) */
const PATH = [
  {x:-40,y:150},{x:260,y:150},{x:260,y:430},{x:520,y:430},{x:520,y:180},
  {x:820,y:180},{x:820,y:560},{x:1080,y:560},{x:1080,y:300},{x:1250,y:300},
];
const CASTLE = PATH[PATH.length-1];
const SLOTS = [
  {x:130,y:270},{x:370,y:280},{x:370,y:110},{x:400,y:520},
  {x:640,y:430},{x:640,y:230},{x:520,y:640},{x:700,y:120},
  {x:940,y:280},{x:940,y:560},{x:820,y:680},{x:1180,y:430},
  {x:1180,y:180},{x:960,y:120},{x:200,y:520},{x:1080,y:660},
].map(s => ({...s, tower:null, mesh:null, marker:null, pick:null}));

/* 3) PROYECCIÓN world -> escena */
const SC = 0.05;
const CX = 605, CY = 400;           // centro aprox del mundo (1200x800)
function sx(wx){ return (wx - CX) * SC; }
function sz(wy){ return (wy - CY) * SC; }

/* 4) THREE + cámara orbital */
let scene, camera, renderer, raycaster, pointer;
const cam = { target:new THREE.Vector3(0,0,0), yaw:Math.PI/4, pitch:0.92, view:32, dist:180 };
const ASPECT = 940/520;

function initThree() {
  const stage = document.getElementById('stage');
  const wpx = stage.clientWidth || 940, hpx = wpx/ASPECT;

  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x8ec9ff);
  scene.fog = new THREE.Fog(0x8ec9ff, 170, 300);

  camera = new THREE.OrthographicCamera(-1,1,1,-1,1,600);

  renderer = new THREE.WebGLRenderer({ antialias:true });
  renderer.setPixelRatio(Math.min(2, window.devicePixelRatio||1));
  renderer.setSize(wpx, hpx);
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  stage.appendChild(renderer.domElement);

  scene.add(new THREE.HemisphereLight(0xbfe3ff, 0x4a6b45, 0.8));
  const dir = new THREE.DirectionalLight(0xfff2d6, 0.9);
  dir.position.set(50, 90, 30); dir.castShadow = true;
  dir.shadow.mapSize.set(2048,2048);
  const d = 70;
  dir.shadow.camera.left=-d; dir.shadow.camera.right=d;
  dir.shadow.camera.top=d; dir.shadow.camera.bottom=-d;
  dir.shadow.camera.near=1; dir.shadow.camera.far=260;
  scene.add(dir);

  buildWorld();
  buildSlots();
  updateCamera();

  raycaster = new THREE.Raycaster();
  pointer = new THREE.Vector2();
  window.addEventListener('resize', onResize);
  setupControls();
}

function updateCamera() {
  const c = cam;
  camera.left=-c.view*ASPECT; camera.right=c.view*ASPECT;
  camera.top=c.view; camera.bottom=-c.view;
  camera.updateProjectionMatrix();
  const dx = Math.cos(c.pitch)*Math.sin(c.yaw);
  const dy = Math.sin(c.pitch);
  const dz = Math.cos(c.pitch)*Math.cos(c.yaw);
  camera.position.set(c.target.x+dx*c.dist, c.target.y+dy*c.dist, c.target.z+dz*c.dist);
  camera.lookAt(c.target);
}

function onResize() {
  const stage = document.getElementById('stage');
  const wpx = stage.clientWidth || 940;
  renderer.setSize(wpx, wpx/ASPECT);
}

function distToSeg(px,py,a,b){
  const dx=b.x-a.x, dy=b.y-a.y, L2=dx*dx+dy*dy||1;
  let t=((px-a.x)*dx+(py-a.y)*dy)/L2; t=Math.max(0,Math.min(1,t));
  return Math.hypot(px-(a.x+t*dx), py-(a.y+t*dy));
}

const PATH_Y = 0.35;
function terrainH(wx,wy){
  const n = Math.sin(wx*0.0075)*Math.cos(wy*0.0085)
          + 0.55*Math.sin(wx*0.017+1.7)*Math.cos(wy*0.013+0.4)
          + 0.30*Math.sin((wx+wy)*0.02+2.1);
  return (n+1.85)*1.25;               // ~ [0 .. 4.6] unidades de escena
}
function isOnPath(wx,wy){
  for(let i=0;i<PATH.length-1;i++){ if(distToSeg(wx,wy,PATH[i],PATH[i+1])<26) return true; }
  return false;
}
function groundTop(wx,wy){ return isOnPath(wx,wy) ? PATH_Y : terrainH(wx,wy); }
function mixColor(a,b,t){
  const ar=(a>>16)&255, ag=(a>>8)&255, ab=a&255, br=(b>>16)&255, bg=(b>>8)&255, bb=b&255;
  return (Math.round(ar+(br-ar)*t)<<16)|(Math.round(ag+(bg-ag)*t)<<8)|Math.round(ab+(bb-ab)*t);
}

function buildWorld() {
  // base amplia bajo el terreno
  const base = new THREE.Mesh(new THREE.BoxGeometry(96,2,70),
    new THREE.MeshLambertMaterial({ color:0x2f5540 }));
  base.position.set(0,-2,0); base.receiveShadow=true; scene.add(base);

  // Cada tile es una columna voxel; su altura sigue el campo de terreno => relieve.
  // Columnas casi sin hueco + color por altura => se pierde el aspecto de cuadrícula.
  const tileW=40, side=tileW*SC*0.995, COL=8;
  const colGeo=new THREE.BoxGeometry(side,COL,side);
  const greens=[];
  for(let i=0;i<7;i++) greens.push(new THREE.MeshLambertMaterial({color:mixColor(0x33583d,0x74a85c,i/6)}));
  const pathMat=new THREE.MeshLambertMaterial({color:0xb59468});
  const grassTiles=[];
  for(let c=0;c<30;c++) for(let r=0;r<20;r++){
    const wx=c*tileW+tileW/2, wy=r*tileW+tileW/2;
    if(isOnPath(wx,wy)){
      const m=new THREE.Mesh(colGeo, pathMat);
      m.position.set(sx(wx), PATH_Y-COL/2, sz(wy)); m.receiveShadow=true; scene.add(m);
    } else {
      const top=terrainH(wx,wy);
      const bucket=Math.max(0,Math.min(6,Math.floor(top/4.6*6)));
      const m=new THREE.Mesh(colGeo, greens[bucket]);
      m.position.set(sx(wx), top-COL/2, sz(wy)); m.receiveShadow=true; scene.add(m);
      grassTiles.push({wx,wy,top});
    }
  }
  buildDecor(grassTiles);
  buildCastle();
}

function buildCastle() {
  const g=new THREE.Group();
  const stone=new THREE.MeshLambertMaterial({color:0x9aa0b5});
  const stoneD=new THREE.MeshLambertMaterial({color:0x7f8599});
  const baseB=new THREE.Mesh(new THREE.BoxGeometry(70*SC,55*SC,70*SC), stone);
  baseB.position.y=55*SC/2; g.add(baseB);
  const top=new THREE.Mesh(new THREE.BoxGeometry(80*SC,14*SC,80*SC), stoneD);
  top.position.y=55*SC+14*SC/2; g.add(top);
  // 4 torreones
  for(const [ox,oz] of [[-1,-1],[1,-1],[-1,1],[1,1]]){
    const t=new THREE.Mesh(new THREE.CylinderGeometry(9*SC,9*SC,72*SC,10), stone);
    t.position.set(ox*38*SC, 72*SC/2, oz*38*SC); g.add(t);
    const cone=new THREE.Mesh(new THREE.ConeGeometry(11*SC,20*SC,10),
      new THREE.MeshLambertMaterial({color:0xc0563f}));
    cone.position.set(ox*38*SC, 72*SC+20*SC/2, oz*38*SC); g.add(cone);
  }
  g.traverse(o=>{ if(o.isMesh){ o.castShadow=true; o.receiveShadow=true; } });
  g.position.set(sx(CASTLE.x-10), groundTop(CASTLE.x-10, CASTLE.y), sz(CASTLE.y));
  scene.add(g);
}

function buildDecor(grassTiles) {
  const trunkMat=new THREE.MeshLambertMaterial({color:0x5a3f28});
  const leafMats=[0x33632f,0x2c5a34,0x264d2b].map(c=>new THREE.MeshLambertMaterial({color:c}));
  const trunkGeo=new THREE.CylinderGeometry(0.12,0.16,0.9,6);
  const leafGeo=new THREE.IcosahedronGeometry(0.62,0); // redondeado low-poly => "no tan cuadrado"
  let placed=0;
  for(const t of grassTiles){
    if(Math.random()<0.11 && placed<75){
      placed++;
      const gx=sx(t.wx)+(Math.random()-.5)*0.6, gz=sz(t.wy)+(Math.random()-.5)*0.6;
      const trunk=new THREE.Mesh(trunkGeo, trunkMat); trunk.position.set(gx,t.top+0.45,gz);
      const leaf=new THREE.Mesh(leafGeo, leafMats[placed%3]);
      leaf.position.set(gx,t.top+1.1,gz); leaf.scale.set(1,0.95,1);
      trunk.receiveShadow=true; leaf.castShadow=true;
      scene.add(trunk); scene.add(leaf);
    }
  }
  // rocas dispersas sobre el relieve
  const rockMat=new THREE.MeshLambertMaterial({color:0x7c8290});
  for(let i=0;i<12;i++){
    const t=grassTiles[Math.floor(Math.random()*grassTiles.length)]; if(!t)break;
    const rk=new THREE.Mesh(new THREE.DodecahedronGeometry(0.35+Math.random()*0.5,0), rockMat);
    rk.position.set(sx(t.wx)+(Math.random()-.5)*0.8, t.top+0.25, sz(t.wy)+(Math.random()-.5)*0.8);
    rk.rotation.set(Math.random(),Math.random(),Math.random());
    rk.castShadow=true; scene.add(rk);
  }
  // colinas redondeadas en los bordes (domos)
  const hillMat=new THREE.MeshLambertMaterial({color:0x2f5540});
  const hills=[[-42,-27],[44,-25],[-46,21],[48,25],[0,-32],[-48,-2],[30,30]];
  for(const [hx,hz] of hills){
    const rad=6+Math.random()*5;
    const dome=new THREE.Mesh(new THREE.SphereGeometry(rad,10,7,0,Math.PI*2,0,Math.PI/2), hillMat);
    dome.scale.y=0.5; dome.position.set(hx,-0.5,hz); dome.receiveShadow=true; scene.add(dome);
  }
}

function buildSlots() {
  const mGeo=new THREE.CylinderGeometry(15*SC,15*SC,0.2,16);
  for(const s of SLOTS){
    const top=groundTop(s.x,s.y);
    const marker=new THREE.Mesh(mGeo, new THREE.MeshBasicMaterial({
      color:0xd8b055, transparent:true, opacity:0.4 }));
    marker.position.set(sx(s.x),top+0.12,sz(s.y)); scene.add(marker); s.marker=marker;
    const pick=new THREE.Mesh(new THREE.BoxGeometry(30*SC,30*SC,30*SC),
      new THREE.MeshBasicMaterial({transparent:true,opacity:0,depthWrite:false}));
    pick.position.set(sx(s.x),top+1,sz(s.y)); pick.userData.slot=s; scene.add(pick); s.pick=pick;
  }
}

/* 5) ESTADO */
let GOLD,CASTLE_HP,waveIndex,running,gameOver,sellMode,selectedType;
const enemies=[], projectiles=[];
const WAVES=buildWaves(12);

function reset() {
  for(const e of enemies) e.dispose();
  for(const p of projectiles) p.dispose();
  for(const s of SLOTS){ if(s.mesh){scene.remove(s.mesh);disposeMesh(s.mesh);s.mesh=null;} s.tower=null; if(s.marker)s.marker.visible=true; }
  enemies.length=0; projectiles.length=0;
  GOLD=250; CASTLE_HP=25; waveIndex=0;
  running=false; gameOver=false; sellMode=false; selectedType=null;
  spawnQueue=[]; spawnTimer=0;
  document.getElementById('overlay').style.display='none';
  syncSellBtn(); refreshShop(); updateHud();
  setMsg('Alza tus torres sobre los cimientos. Cuando estés listo, invoca la oleada.');
}
function disposeMesh(m){ if(m.geometry)m.geometry.dispose(); if(m.material)m.material.dispose(); }

/* 6) OLEADAS */
function buildWaves(n){
  const waves=[];
  for(let i=1;i<=n;i++){
    const count=6+i*2, hp=Math.round(20*Math.pow(1.22,i-1)), speed=55+i*1.5;
    const list=[];
    for(let k=0;k<count;k++){
      const tank=(i%5===0)&&(k%4===0);
      list.push({hp:tank?hp*4:hp, speed:tank?speed*0.6:speed, radius:tank?13:9,
        color:tank?0xff5b5b:0xd8dcea, reward:tank?12:5, delay:0.65});
    }
    waves.push(list);
  }
  return waves;
}
let spawnQueue=[], spawnTimer=0;
function startWave(){ if(running||gameOver||waveIndex>=WAVES.length)return;
  spawnQueue=WAVES[waveIndex].slice(); spawnTimer=0; running=true; updateHud(); }

/* 7) ENTIDADES */
class Enemy {
  constructor(spec){
    this.x=PATH[0].x; this.y=PATH[0].y; this.seg=0;
    this.hp=spec.hp; this.maxHp=spec.hp; this.speed=spec.speed;
    this.radius=spec.radius; this.color=spec.color; this.reward=spec.reward;
    this.dead=false; this.reached=false; this.slowT=0; this.slowMult=1; this.dist=0;
    const s=this.radius*SC*2, h=this.radius*SC*2.2; this.h=h;
    this.mesh=new THREE.Mesh(new THREE.BoxGeometry(s,h,s),
      new THREE.MeshLambertMaterial({color:this.color}));
    this.mesh.castShadow=true; scene.add(this.mesh);
    this.bar=new THREE.Group();
    const bw=s*1.8;
    const bg=new THREE.Mesh(new THREE.PlaneGeometry(bw,0.16), new THREE.MeshBasicMaterial({color:0x101418}));
    this.fill=new THREE.Mesh(new THREE.PlaneGeometry(bw,0.14), new THREE.MeshBasicMaterial({color:0x5ee06a}));
    this.fillW=bw; this.fill.position.z=0.01;
    this.bar.add(bg); this.bar.add(this.fill); scene.add(this.bar);
  }
  update(dt){
    let sp=this.speed;
    if(this.slowT>0){this.slowT-=dt; sp*=this.slowMult; if(this.slowT<=0)this.slowMult=1;}
    let move=sp*dt;
    while(move>0&&this.seg<PATH.length){
      const t=PATH[this.seg+1]; if(!t){this.reached=true;return;}
      const dx=t.x-this.x, dy=t.y-this.y, d=Math.hypot(dx,dy);
      if(d<=move){this.x=t.x;this.y=t.y;move-=d;this.dist+=d;this.seg++;}
      else{this.x+=dx/d*move;this.y+=dy/d*move;this.dist+=move;move=0;}
    }
    if(this.seg>=PATH.length-1)this.reached=true;
  }
  syncMesh(){
    this.mesh.position.set(sx(this.x), PATH_Y+this.h/2+0.05, sz(this.y));
    this.mesh.material.color.setHex(this.slowT>0?0x5ad2ff:this.color);
    const ratio=Math.max(0,this.hp/this.maxHp);
    this.fill.scale.x=ratio; this.fill.position.x=-this.fillW*(1-ratio)/2;
    this.bar.position.set(sx(this.x), PATH_Y+this.h+0.9, sz(this.y));
    this.bar.rotation.y=cam.yaw; // mirar a la cámara
  }
  hit(dmg){this.hp-=dmg; if(this.hp<=0)this.dead=true;}
  applySlow(slow){this.slowT=slow.dur; this.slowMult=Math.min(this.slowMult,slow.mult);}
  dispose(){ scene.remove(this.mesh);disposeMesh(this.mesh);
    scene.remove(this.bar); this.bar.children.forEach(disposeMesh); }
}

class Tower {
  constructor(type,slot){
    const def=TOWERS[type]; this.type=type; this.def=def;
    this.x=slot.x; this.y=slot.y; this.cooldown=0;
    const g=new THREE.Group();
    const base=new THREE.Mesh(new THREE.BoxGeometry(26*SC,16*SC,26*SC),
      new THREE.MeshLambertMaterial({color:0x8a8f9c}));
    base.position.y=16*SC/2; g.add(base);
    const body=new THREE.Mesh(new THREE.BoxGeometry(20*SC,34*SC,20*SC),
      new THREE.MeshLambertMaterial({color:def.color}));
    body.position.y=16*SC+34*SC/2; g.add(body);
    const cap=new THREE.Mesh(new THREE.CylinderGeometry(11*SC,11*SC,6*SC,8),
      new THREE.MeshLambertMaterial({color:0xffffff}));
    cap.position.y=16*SC+34*SC+6*SC/2; g.add(cap);
    g.traverse(o=>{if(o.isMesh){o.castShadow=true;o.receiveShadow=true;}});
    g.position.set(sx(this.x),groundTop(this.x,this.y),sz(this.y));
    scene.add(g); slot.mesh=g;
  }
  update(dt){
    this.cooldown-=dt; if(this.cooldown>0)return;
    const target=this.pickTarget();
    if(target){this.fire(target); this.cooldown=1/this.def.rate;}
  }
  pickTarget(){
    let best=null,bd=-1;
    for(const e of enemies){ if(e.dead||e.reached)continue;
      if(Math.hypot(e.x-this.x,e.y-this.y)<=this.def.range && e.dist>bd){best=e;bd=e.dist;} }
    return best;
  }
  fire(target){ projectiles.push(new Projectile(this.x,this.y,target,this.def));
    /* TODO fusión: mecánicas especiales (chain Tesla, shatter, etc.) */ }
}

class Projectile {
  constructor(x,y,target,def){
    this.x=x;this.y=y;this.target=target;this.def=def;this.speed=420;this.dead=false;
    this.mesh=new THREE.Mesh(new THREE.SphereGeometry(0.16,8,8),
      new THREE.MeshBasicMaterial({color:def.color}));
    scene.add(this.mesh);
  }
  update(dt){
    if(this.target.dead||this.target.reached){this.dead=true;return;}
    const dx=this.target.x-this.x, dy=this.target.y-this.y, d=Math.hypot(dx,dy), move=this.speed*dt;
    if(d<=move){this.impact();this.dead=true;} else {this.x+=dx/d*move;this.y+=dy/d*move;}
  }
  syncMesh(){ this.mesh.position.set(sx(this.x),1.6,sz(this.y)); }
  impact(){
    const def=this.def;
    if(def.splash>0){
      for(const e of enemies){ if(e.dead||e.reached)continue;
        if(Math.hypot(e.x-this.x,e.y-this.y)<=def.splash){
          e.hit(def.damage); if(def.slow)e.applySlow(def.slow); grantIfDead(e);} }
    } else { this.target.hit(def.damage); if(def.slow)this.target.applySlow(def.slow); grantIfDead(this.target); }
  }
  dispose(){ scene.remove(this.mesh); disposeMesh(this.mesh); }
}
function grantIfDead(e){ if(e.dead&&!e._counted){e._counted=true; GOLD+=e.reward;} }

/* 8) LOOP */
let last=performance.now();
function loop(now){
  const dt=Math.min(0.033,(now-last)/1000); last=now;
  if(!gameOver) update(dt);
  render();
  requestAnimationFrame(loop);
}
function update(dt){
  if(running){
    spawnTimer-=dt;
    if(spawnTimer<=0&&spawnQueue.length){enemies.push(new Enemy(spawnQueue.shift()));spawnTimer=0.65;}
    if(!spawnQueue.length&&enemies.length===0){
      running=false; waveIndex++; GOLD+=40; if(waveIndex>=WAVES.length)endGame(true); }
  }
  for(const s of SLOTS) if(s.tower) s.tower.update(dt);
  for(const e of enemies){ e.update(dt);
    if(e.reached&&!e.dead){e.dead=true;CASTLE_HP-=1;if(CASTLE_HP<=0)endGame(false);} }
  for(const p of projectiles) p.update(dt);
  for(let i=enemies.length-1;i>=0;i--) if(enemies[i].dead){enemies[i].dispose();enemies.splice(i,1);}
  for(let i=projectiles.length-1;i>=0;i--) if(projectiles[i].dead){projectiles[i].dispose();projectiles.splice(i,1);}
  updateHud();
}

/* 9) RENDER */
function render(){
  for(const e of enemies) e.syncMesh();
  for(const p of projectiles) p.syncMesh();
  updateCamera();
  renderer.render(scene,camera);
}

/* 10) CONTROLES DE CÁMARA (pan / zoom / rotar) + colocación */
function setupControls(){
  const el=renderer.domElement, stage=document.getElementById('stage');
  let dragging=false, btn=0, lx=0, ly=0, downX=0, downY=0, moved=false;

  el.addEventListener('pointerdown', e=>{
    dragging=true; btn=e.button; lx=downX=e.clientX; ly=downY=e.clientY; moved=false;
    stage.classList.add('grabbing'); el.setPointerCapture(e.pointerId);
  });
  el.addEventListener('pointermove', e=>{
    if(!dragging)return;
    const dx=e.clientX-lx, dy=e.clientY-ly; lx=e.clientX; ly=e.clientY;
    if(Math.abs(e.clientX-downX)+Math.abs(e.clientY-downY)>5) moved=true;
    if(btn===2){ // rotar
      cam.yaw -= dx*0.006;
      cam.pitch = Math.max(0.5, Math.min(1.35, cam.pitch - dy*0.004));
    } else { // pan
      const k=(2*cam.view)/el.clientHeight;
      const right={x:Math.cos(cam.yaw),z:-Math.sin(cam.yaw)};
      const fwd  ={x:Math.sin(cam.yaw),z:Math.cos(cam.yaw)};
      cam.target.x += (-right.x*dx - fwd.x*dy)*k;
      cam.target.z += (-right.z*dx - fwd.z*dy)*k;
    }
  });
  el.addEventListener('pointerup', e=>{
    dragging=false; stage.classList.remove('grabbing');
    if(btn===0 && !moved) placeAt(e);
  });
  el.addEventListener('wheel', e=>{
    e.preventDefault();
    cam.view = Math.max(14, Math.min(52, cam.view * (e.deltaY>0?1.1:0.9)));
  }, {passive:false});
  el.addEventListener('contextmenu', e=>e.preventDefault());
}

function placeAt(evt){
  if(gameOver)return;
  const rect=renderer.domElement.getBoundingClientRect();
  pointer.x=((evt.clientX-rect.left)/rect.width)*2-1;
  pointer.y=-((evt.clientY-rect.top)/rect.height)*2+1;
  raycaster.setFromCamera(pointer,camera);
  const hits=raycaster.intersectObjects(SLOTS.map(s=>s.pick));
  if(!hits.length)return;
  const slot=hits[0].object.userData.slot;
  if(sellMode){
    if(slot.tower){ GOLD+=Math.round(slot.tower.def.cost*0.6);
      scene.remove(slot.mesh); slot.mesh.traverse(o=>{if(o.isMesh)disposeMesh(o);});
      slot.mesh=null; slot.tower=null; slot.marker.visible=true; refreshShop(); updateHud(); }
    return;
  }
  if(!selectedType){ setMsg('Primero elige una torre del grimorio.'); return; }
  if(slot.tower){ setMsg('Ese cimiento ya sostiene una torre.'); return; }
  const def=TOWERS[selectedType];
  if(GOLD<def.cost){ setMsg('No tienes oro suficiente.'); return; }
  GOLD-=def.cost; slot.tower=new Tower(selectedType,slot); slot.marker.visible=false;
  refreshShop(); updateHud(); setMsg('');
}

/* 11) UI */
function refreshShop(){
  const shop=document.getElementById('shop'); shop.innerHTML='';
  for(const [key,d] of Object.entries(TOWERS)){
    const b=document.createElement('button');
    b.className='tower-btn'+(selectedType===key?' selected':'');
    b.disabled=GOLD<d.cost;
    b.innerHTML=`<span class="gem">${d.cost}</span><span class="swatch" style="background:#${d.color.toString(16).padStart(6,'0')}"></span><span class="name">${d.name}</span>`;
    b.onclick=()=>{selectedType=(selectedType===key?null:key); sellMode=false; syncSellBtn(); refreshShop();};
    shop.appendChild(b);
  }
}
function updateHud(){
  document.getElementById('gold').textContent=GOLD;
  document.getElementById('castle').textContent=CASTLE_HP;
  document.getElementById('waveLine').textContent=Math.min(waveIndex+(running?1:0),WAVES.length)+' / '+WAVES.length;
  document.getElementById('waveState').textContent=running?'Combate':(gameOver?'—':'Planificación');
  document.getElementById('startBtn').disabled=running||gameOver;
}
function setMsg(t){ document.getElementById('msg').textContent=t; }
function syncSellBtn(){ document.getElementById('sellBtn').textContent='Desmantelar: '+(sellMode?'ON':'OFF'); }
function endGame(win){
  gameOver=true; running=false;
  document.getElementById('ovTitle').textContent=win?'El bastión resiste':'Los muros han caído';
  document.getElementById('ovText').textContent=win
    ? 'Las hordas se quiebran contra tu muralla. Por esta noche, el reino perdura.'
    : 'La oscuridad cruza las puertas. Reagrupa tus defensas y alza de nuevo.';
  document.getElementById('overlay').style.display='flex'; updateHud();
}

/* 12) ARRANQUE */
initThree();
document.getElementById('startBtn').onclick=startWave;
document.getElementById('sellBtn').onclick=()=>{sellMode=!sellMode; selectedType=null; syncSellBtn(); refreshShop();};
document.getElementById('ovBtn').onclick=reset;
reset();
requestAnimationFrame(loop);
</script>
