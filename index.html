<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Portafolio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
    }

    iframe {
      width: 100vw;
      height: 100vh;
      border: none;
    }

    .mobile {
      display: none;
      height: 100vh;
      font-family: sans-serif;
      text-align: center;
      padding-top: 40vh;
    }

    @media (max-width: 768px) {
      iframe {
        display: none;
      }
      .mobile {
        display: block;
      }
    }
  </style>
</head>

<body>

  <!-- Desktop -->
  <iframe src="portafolio-diana-ramirez.pdf"></iframe>

  <!-- Mobile -->
  <div class="mobile">
    <h2>Portafolio</h2>
    <p>Para una mejor experiencia, abre el PDF directamente</p>
    <a 
      href="portafolio-diana-ramirez.pdf"
      style="
        display:inline-block;
        padding:12px 18px;
        background:#111;
        color:#fff;
        text-decoration:none;
        border-radius:6px;
      ">
      Abrir portafolio
    </a>
  </div>

</body>
</html>
